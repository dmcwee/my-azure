name: Generate Module Docs

on:
  push:
    branches:
      - master


jobs:
  generate-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4

      - name: Install and import platyPS and My-Azure modules
        shell: pwsh
        run: |
          Install-Module -Name platyPS -Force -Scope CurrentUser
          Import-Module platyPS
          Copy-Item ./my-azure.unsigned.psm1 -Destination ./my-azure.psm1
          Import-Module ./my-azure.psm1
          New-MarkdownHelp -Module My-Azure -OutputFolder ./docs

      - name: Prepend date to generated filenames
        shell: pwsh
        run: |
          $datePrefix = Get-Date -Format "yyyy-MM-dd-"
          Get-ChildItem -Path ./docs -File | ForEach-Object {
            $newName = "$datePrefix$($_.Name)"
            Rename-Item -Path $_.FullName -NewName $newName
          }

      - name: Checkout gh-pages branch and copy docs
        run: |
          # Save generated docs to a temp location
          mkdir /tmp/generated-docs
          mkdir /tmp/main-docs

          rsync -a docs/ /tmp/generated-docs/
          rsync -a *.md /tmp/main-docs/

          # Fetch and checkout gh-pages
          git fetch origin gh-pages
          git checkout gh-pages

          # Copy generated files into _posts
          rm -rf _posts
          mkdir -p _posts
          rsync -a /tmp/generated-docs/ _posts/
          rsync -a /tmp/main-docs/* .

      - name: Commit and push to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts/
          git commit -m "Update docs - $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push origin gh-pages
